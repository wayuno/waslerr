<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- full-bleed rasterization source for PNG icons: no transparent corners
       (thumbnailers flatten transparency to white), launchers apply their own
       mask (maskable purpose) -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="18%" r="110%">
      <stop offset="0" stop-color="#241a0e"></stop><stop offset=".55" stop-color="#100c07"></stop><stop offset="1" stop-color="#070503"></stop>
    </radialGradient>
    <linearGradient id="gL3" x1="18" y1="10" x2="52" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6e7b4"></stop><stop offset="1" stop-color="#b8862b"></stop>
    </linearGradient>
    <linearGradient id="gR3" x1="102" y1="10" x2="68" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e9cd7f"></stop><stop offset="1" stop-color="#8a6420"></stop>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"></rect>
  <rect x="26" y="26" width="460" height="460" rx="98" fill="none" stroke="#d4af37" stroke-opacity=".45" stroke-width="8"></rect>
  <g transform="translate(88 94) scale(2.8)">
    <path d="M16 10 L34 10 L52 62 L44 86 Z" fill="url(#gL3)"></path>
    <path d="M104 10 L86 10 L68 62 L76 86 Z" fill="url(#gR3)"></path>
    <path d="M60 18 L72 34 L60 46 L48 34 Z" fill="#f6e7b4"></path>
  </g>
</svg>
